services:
  - type: web
    name: medora-api
    env: python
    region: frankfurt
    plan: free
    branch: main
    rootDir: apps/api
    buildCommand: |
      pip install -r requirements.txt
      python data/generate_synthetic.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
